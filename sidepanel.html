<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* --- Mörkt tema (default) --- */
        body {
            font-family: 'DM Mono', monospace;
            font-size: var(--ar-font-size, 13px);
            display: flex;
            flex-direction: column;
            height: 100vh;
            background: #1a1610;
            color: #f5f0e8;
        }

        #header {
            padding: 12px 16px;
            border-bottom: 1px solid #333;
            font-size: 11px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            opacity: 0.6;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }

        #header-knappar {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        #exportera,
        #tema-knapp,
        #font-liten,
        #font-stor {
            background: transparent;
            border: 1px solid #444;
            color: #f5f0e8;
            border-radius: 4px;
            cursor: pointer;
            padding: 3px 8px;
            opacity: 0.7;
            letter-spacing: 0.05em;
            line-height: 1;
        }

        #exportera,
        #tema-knapp { font-size: 11px; }
        #font-liten { font-size: 10px; }
        #font-stor  { font-size: 14px; font-weight: 600; }

        #exportera:hover,
        #tema-knapp:hover,
        #font-liten:hover,
        #font-stor:hover {
            opacity: 1;
        }

        #kontext {
            padding: 12px 16px;
            background: #2a2218;
            border-bottom: 1px solid #333;
            font-size: 12px;
            line-height: 1.5;
        }

        #kontext .fras {
            font-weight: 600;
            margin-bottom: 4px;
        }

        #kontext .kategori {
            opacity: 0.6;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        #legende {
            padding: 8px 16px;
            border-bottom: 1px solid #333;
            flex-shrink: 0;
        }

        #legende:empty {
            display: none;
        }

        #meddelanden {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .bubbla {
            padding: 10px 12px;
            border-radius: 8px;
            line-height: 1.5;
            max-width: 90%;
            white-space: pre-wrap;
        }

        .bubbla.user {
            background: #2a2218;
            align-self: flex-end;
        }

        .bubbla.assistant {
            background: #372d20;
            align-self: flex-start;
        }

        #input-area {
            padding: 12px;
            border-top: 1px solid #333;
            display: flex;
            gap: 8px;
        }

        #input {
            flex: 1;
            padding: 8px;
            background: #2a2218;
            border: 1px solid #444;
            border-radius: 6px;
            color: #f5f0e8;
            font-size: 13px;
            resize: none;
            height: 60px;
        }

        #skicka {
            padding: 8px 12px;
            background: #f0c040;
            color: #1a1610;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            align-self: flex-end;
        }

        #korsreferera {
            padding: 8px 10px;
            background: #2a2218;
            color: #f5f0e8;
            border: 1px solid #444;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            align-self: flex-end;
        }

        #korsreferera:hover {
            border-color: #888;
        }

        .ar-tänker span {
            background: #f5f0e8;
        }

        /* --- Ljust tema --- */
        body.ljust {
            background: #ededed;
            /* omgivningen */
            color: #2a2218;
        }

        body.ljust #header {
            background: #ededed;
            border-bottom-color: #cccccc;
        }

        body.ljust #exportera,
        body.ljust #tema-knapp,
        body.ljust #font-liten,
        body.ljust #font-stor {
            border-color: #aaaaaa;
            color: #2a2218;
        }

        body.ljust #kontext {
            background: #2a2218;
            color: #f5f0e8;
            border-bottom-color: #1a1610;
        }

        body.ljust #legende {
            border-bottom-color: #cccccc;
        }

        body.ljust #meddelanden {
            background: #ededed;
        }

        /* chatfönstret */
        body.ljust .bubbla.user {
            background: #fdfdff;
        }

        body.ljust .bubbla.assistant {
            background: #fdfdff;
        }

        body.ljust #input-area {
            background: #d4d4d4;
            border-top-color: #bcbcbc;
        }

        /* inmatningsfältet */
        body.ljust #input {
            background: #c4c4c4;
            border-color: #aaaaaa;
            color: #2a2218;
        }

        body.ljust #korsreferera {
            background: #c4c4c4;
            color: #2a2218;
            border-color: #aaaaaa;
        }

        body.ljust #korsreferera:hover {
            border-color: #2a2218;
        }

        body.ljust .ar-tänker span {
            background: #2a2218;
        }

        /* --- Animationer --- */
        @keyframes studsa {

            0%,
            80%,
            100% {
                transform: translateY(0);
                opacity: 0.35;
            }

            40% {
                transform: translateY(-5px);
                opacity: 1;
            }
        }

        .ar-tänker {
            display: flex;
            gap: 5px;
            padding: 10px 12px;
            align-self: flex-start;
        }

        .ar-tänker span {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            animation: studsa 1.2s infinite ease-in-out;
        }

        .ar-tänker span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .ar-tänker span:nth-child(3) {
            animation-delay: 0.4s;
        }

        /* --- Markdown-rendering --- */
        .bubbla h1, .bubbla h2, .bubbla h3 {
            font-size: 13px;
            font-weight: 600;
            margin: 8px 0 4px;
        }
        .bubbla p { margin: 0 0 6px; }
        .bubbla p:last-child { margin-bottom: 0; }
        .bubbla ul, .bubbla ol { padding-left: 16px; margin: 4px 0; }
        .bubbla li { margin-bottom: 2px; }
        .bubbla strong { font-weight: 600; }
        .bubbla em { font-style: italic; }
        .bubbla code {
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            background: rgba(0,0,0,0.2);
            padding: 1px 4px;
            border-radius: 3px;
        }
        .bubbla pre {
            background: rgba(0,0,0,0.2);
            padding: 8px;
            border-radius: 4px;
            overflow-x: auto;
            margin: 6px 0;
        }
        .bubbla pre code { background: none; padding: 0; }
        .bubbla hr { border: none; border-top: 1px solid rgba(255,255,255,0.15); margin: 8px 0; }

        body.ljust .bubbla code,
        body.ljust .bubbla pre { background: rgba(0,0,0,0.08); }
        body.ljust .bubbla hr { border-top-color: rgba(0,0,0,0.15); }
    </style>
</head>

<body>
    <div id="header">
        <span id="header-text">AIuda Reader</span>
        <div id="header-knappar">
            <button id="font-liten" title="Smaller text">A</button>
            <button id="font-stor" title="Larger text">A</button>
            <button id="tema-knapp" title="Toggle theme">☀</button>
            <button id="exportera">↓ Export</button>
        </div>
    </div>
    <div id="kontext">
        <div class="kategori" id="sp-kategori"></div>
        <div class="fras" id="sp-fras"></div>
        <div id="sp-beskrivning"></div>
        <div id="sp-sammanfattning" style="margin-top:6px;opacity:0.7;font-style:italic;font-size:0.9em;"></div>
    </div>
    <div id="legende"></div>
    <div id="meddelanden"></div>
    <div id="input-area">
        <button id="korsreferera" title="Korsreferera annan markering">↔</button>
        <textarea id="input" placeholder="Ask a question..."></textarea>
        <button id="skicka">→</button>
    </div>
    <script src="marked.min.js"></script>
    <script src="locales.js"></script>
    <script src="sidepanel.js"></script>
</body>

</html>
