<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 260px;
      padding: 16px;
      font-family: sans-serif;
      font-size: 13px;
    }

    input {
      width: 100%;
      padding: 6px;
      margin: 6px 0 10px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 8px;
      cursor: pointer;
      margin-bottom: 6px;
    }

    #status {
      color: green;
      font-size: 12px;
    }

    #avancerat-panel {
      display: none;
      margin-top: 10px;
      padding: 12px;
      background: #f5f5f5;
      border-radius: 6px;
      border: 1px solid #ddd;
    }

    #avancerat-panel label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #555;
      margin-bottom: 4px;
    }

    #avancerat-panel select {
      width: 100%;
      padding: 5px;
      margin-bottom: 12px;
      font-size: 12px;
      box-sizing: border-box;
    }

    #temp-rad {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
    }

    #temp-slider {
      flex: 1;
    }

    #temp-värde {
      width: 32px;
      font-size: 12px;
      font-weight: 600;
      text-align: right;
    }

    #temp-not {
      font-size: 11px;
      color: #888;
      margin-bottom: 10px;
    }

    #avancerat-btn {
      background: transparent;
      border: 1px solid #ccc;
      color: #555;
      font-size: 12px;
      padding: 5px;
    }

    #spara-avancerat {
      font-size: 12px;
      padding: 6px;
      background: #333;
      color: #fff;
      border: none;
      border-radius: 4px;
    }
  </style>
</head>

<body>
  <!-- Consent-dialog — visas första gången -->
  <div id="consent-dialog" style="display:none;">
    <p style="font-size:12px;line-height:1.6;margin-bottom:10px;" id="consent-text"></p>
    <a id="consent-lank" href="https://annotated-reader-backend.vercel.app/privacy.html"
       target="_blank" style="font-size:11px;color:#555;display:block;margin-bottom:12px;"></a>
    <button id="consent-knapp" style="width:100%;padding:8px;background:#333;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:12px;"></button>
  </div>

  <div id="huvud-innehall" style="display:none;">
  <div id="ny-version" style="display:none;margin-bottom:10px;padding:8px;background:#fff8e1;border:1px solid #f0c040;border-radius:4px;font-size:11px;color:#555;">
    🆕 <span id="ny-version-text"></span> <a id="ny-version-lank" href="#" target="_blank" style="color:#333;font-weight:600;"></a>
  </div>
  <div id="auth-sektion">
    <div id="inloggad-info" style="display:none;margin-bottom:8px;">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">
        <img id="user-photo" style="width:24px;height:24px;border-radius:50%;" />
        <span id="user-name" style="font-size:12px;font-weight:600;"></span>
      </div>
      <button id="sign-out-btn" style="width:100%;padding:5px;font-size:11px;background:#eee;border:1px solid #ccc;border-radius:4px;cursor:pointer;">Sign out</button>
    </div>
    <button id="sign-in-btn" style="width:100%;padding:8px;background:#fff;border:1px solid #ddd;border-radius:4px;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:8px;">
      <img src="google-icon.svg" style="width:16px;height:16px;" />
      Sign in with Google
    </button>
  </div>
  <button id="annotate-btn" style="display:none;">Annotate this page</button>
  <button id="avancerat-btn">Advanced...</button>

  <div id="avancerat-panel">
    <label id="sprak-label">Language</label>
    <select id="sprak-val" style="width:100%;padding:5px;margin-bottom:12px;font-size:12px;box-sizing:border-box;">
      <option value="en">English (US)</option>
      <option value="en-GB">English (UK)</option>
      <option value="da">Dansk</option>
      <option value="de">Deutsch</option>
      <option value="es">Español</option>
      <option value="fr">Français</option>
      <option value="it">Italiano</option>
      <option value="no">Norsk</option>
      <option value="sv">Svenska</option>
    </select>

    <label id="modell-label">Model</label>
    <select id="modell-val">
      <option value="claude-opus-4-7">Opus 4.7 (most powerful)</option>
      <option value="claude-sonnet-4-6">Sonnet 4.6 (balanced)</option>
      <option value="claude-haiku-4-5-20251001">Haiku 4.5 (fastest)</option>
    </select>

    <label id="temp-label">Temperature</label>
    <div id="temp-rad">
      <input type="range" id="temp-slider" min="0" max="1" step="0.1" value="1">
      <span id="temp-värde">1.0</span>
    </div>
    <div id="temp-not"></div>

    <label id="genväg-label">Annotation shortcut</label>
    <div style="font-size:11px;color:#666;margin-bottom:4px;">Default: <strong>Alt+Shift+A</strong></div>
    <div style="font-size:11px;color:#666;margin-bottom:12px;">
      Change at <a href="#" id="genväg-länk" style="color:#888;">chrome://extensions/shortcuts</a>
    </div>

    <button id="spara-avancerat">Save</button>

    <div id="kryptering-sektion" style="margin-top:14px;padding-top:14px;border-top:1px solid #ddd;">
      <label style="display:block;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;color:#555;margin-bottom:6px;">Encryption</label>
      <div id="kryptering-status" style="font-size:11px;color:#888;margin-bottom:8px;">🔓 Not set up</div>
      <button id="kryptering-knapp" style="width:100%;padding:6px;font-size:11px;background:#333;color:#fff;border:none;border-radius:4px;cursor:pointer;">🔑 Set up encryption…</button>
    </div>

    <div id="kvot-info" style="display:none;margin-top:10px;padding:8px;background:#ececec;border-radius:4px;font-size:11px;color:#555;">
      <div id="kvot-text"></div>
      <div style="margin-top:5px;background:#ddd;border-radius:3px;height:4px;">
        <div id="kvot-bar" style="height:4px;border-radius:3px;background:#f0c040;transition:width 0.3s;"></div>
      </div>
      <!-- Uppgradera plan -->
      <div id="uppgradera-plan" style="display:none;margin-top:10px;">
        <button id="uppgradera-pro-btn" style="display:none;width:100%;padding:7px;background:#333;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:11px;margin-bottom:4px;"></button>
        <button id="uppgradera-vip-btn" style="display:none;width:100%;padding:7px;background:#f0c040;color:#1a1610;border:none;border-radius:4px;cursor:pointer;font-size:11px;font-weight:600;margin-bottom:8px;"></button>
        <!-- Kreditpaket -->
        <div id="krediter-rubrik" style="font-size:10px;text-transform:uppercase;letter-spacing:0.05em;color:#888;margin-bottom:4px;"></div>
        <div style="display:flex;gap:4px;">
          <button class="kredit-btn" data-produkt="" style="flex:1;padding:5px;background:#fff;border:1px solid #ccc;border-radius:4px;cursor:pointer;font-size:10px;"></button>
          <button class="kredit-btn" data-produkt="" style="flex:1;padding:5px;background:#fff;border:1px solid #ccc;border-radius:4px;cursor:pointer;font-size:10px;"></button>
          <button class="kredit-btn" data-produkt="" style="flex:1;padding:5px;background:#fff;border:1px solid #ccc;border-radius:4px;cursor:pointer;font-size:10px;"></button>
        </div>
      </div>
    </div>
  </div>
  </div><!-- slut huvud-innehall -->
  <div id="status"></div>
  <script src="locales.js"></script>
  <script src="kryptering.js"></script>
  <script src="popup.js"></script>
</body>

</html>
